name: CI Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tools
        run: python -m pip install -r requirements-dev.txt

      - name: Ruff
        run: python -m ruff check scripts tests

      - name: Pytest
        run: python -m pytest

      - name: Validate markdown and docs presence
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -d docs
